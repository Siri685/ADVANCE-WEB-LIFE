<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Position Example</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.main{
    width:400px;
    height:300px;
    border:2px solid red;
    margin:100px auto;
    position:relative;
}

.box{
    width:100px;
    height:100px;
    border:2px solid black;
    background:red;
    color:white;
    position:absolute;
    display:flex;
    justify-content:center;
    align-items:center;
}

#box-1{
    top:0;
    right:0;
}

#box-2{
    right:0;
    bottom:0;
}


#box-3{
    top:0;
    left:0;
}

#box-4{
    left:0;
    bottom:0;
}
</style>
</head>

<body>

<div class="main">
    <div class="box" id="box-1">Box-1</div>
    <div class="box" id="box-2">Box-2</div>
    <div class="box" id="box-3">Box-3</div>
    <div class="box" id="box-4">Box-4</div>
</div>

</body>
</html>
