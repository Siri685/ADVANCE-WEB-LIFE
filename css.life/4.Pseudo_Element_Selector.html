 <!-- 1. Pseudo Element Selector is used in article publishing 
     2. It is denoted in ::
     3. it has (i) First-letter
               (ii) First-line
            (iii) Before--Inserts content before an element.
            (iv) After--Inserts content after an element.Selector will use content which is to be added in double quotes
            (v) Selection -- Styles the selected text.It is used to select the background color
            (vi)MArker-- is used for (bullet,numbers) list items
            (vii)Placeholder -- Styles placeholder text in input fields.-->
