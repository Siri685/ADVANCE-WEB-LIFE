<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <style>
        table{
            border-collapse: collapse;
            width: 500px;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }

        th, td{
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th{
            background: #f2f2f2;
        }

        .color{
            color: white;
            font-weight: bold;
        }

        .black{background:#000000;}
        .navy{background:#000080;}
        .blue{background:#0000FF;}
        .green{background:#008000;}
        .teal{background:#008080;}
        .lime{background:#00FF00; color:black;}
        .aqua{background:#00FFFF; color:black;}
        .maroon{background:#800000;}
        .purple{background:#800080;}
        .olive{background:#808000;}
        .gray{background:#808080;}
        .silver{background:#C0C0C0; color:black;}
        .red{background:#FF0000;}
        .fuchsia{background:#FF00FF;}
        .orange{background:#FFA500; color:black;}
        .yellow{background:#FFFF00; color:black;}
        .white{background:#FFFFFF; color:black;}
    </style>
</head>
<body>
<table>
    <tr>
        <th>Color Name</th>
        <th>Hex Code</th>
    </tr>

    <tr><td class="color black">Black</td><td>#000000</td></tr>
    <tr><td class="color navy">Navy</td><td>#000080</td></tr>
    <tr><td class="color blue">Blue</td><td>#0000FF</td></tr>
    <tr><td class="color green">Green</td><td>#008000</td></tr>
    <tr><td class="color teal">Teal</td><td>#008080</td></tr>
    <tr><td class="color lime">Lime</td><td>#00FF00</td></tr>
    <tr><td class="color aqua">Aqua</td><td>#00FFFF</td></tr>
    <tr><td class="color maroon">Maroon</td><td>#800000</td></tr>
    <tr><td class="color purple">Purple</td><td>#800080</td></tr>
    <tr><td class="color olive">Olive</td><td>#808000</td></tr>
    <tr><td class="color gray">Gray or Grey</td><td>#808080</td></tr>
    <tr><td class="color silver">Silver</td><td>#C0C0C0</td></tr>
    <tr><td class="color red">Red</td><td>#FF0000</td></tr>
    <tr><td class="color fuchsia">Fuchsia</td><td>#FF00FF</td></tr>
    <tr><td class="color orange">Orange</td><td>#FFA500</td></tr>
    <tr><td class="color yellow">Yellow</td><td>#FFFF00</td></tr>
    <tr><td class="color white">White</td><td>#FFFFFF</td></tr>
</table>
</body>
</html>
